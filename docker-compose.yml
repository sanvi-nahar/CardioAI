version: '3.8'

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: cardioai-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-cardioai}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - cardioai-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cardioai-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-password}@mongo:27017/${MONGO_DB:-cardioai}?authSource=admin
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - FRONTEND_URL=http://localhost
      - CORS_ORIGIN=http://localhost
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - cardioai-network

  # Frontend Web Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cardioai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      - VITE_API_BASE=/api
      - VITE_WS_URL=http://localhost
    depends_on:
      - backend
    networks:
      - cardioai-network

networks:
  cardioai-network:
    driver: bridge

volumes:
  mongo_data:
    driver: local
